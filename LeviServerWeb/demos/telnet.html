
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telnet Web Demo</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="navbar"></div>
<script src="/js/nav.js"></script>

<link href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" rel="stylesheet" />
<div id="terminal" style="height:500px;background:#111;"></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
  const term = new Terminal({ convertEol: true, theme: { background: '#111' } });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  const ws = new WebSocket('wss://ishir.leviserver.eu/ws');
  ws.binaryType = 'arraybuffer';

  ws.onmessage = (e) => term.write(new Uint8Array(e.data));
  ws.onclose = () => term.write('\r\n*** connection closed ***\r\n');
  term.onData((data) => {
    if (data === '\r') {
      term.write('\r\n'); // move to a fresh line locally on Enter
    } else {
      term.write(data);
    }
    if (ws.readyState === WebSocket.OPEN) ws.send(data);
  });
</script>
<section>
  <h2>Telnet Web Demo</h2>
  <div>
    <p>This is my Telnet Server which you can access here via your web browser.</p>
    <p>It is also accessible via any terminal with telnet installed.</p>
  </div>
  <div style="margin-top: 20px;">
    <p>Telnet connection via terminal:</p>
    <p>Host: leviserver.eu</p>
    <p>Port: 1437</p>
    <p>Command: telnet leviserver.eu 1437</p>
  </div>
</section>
</body>
</html>
